<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DEBUG LIFF</title>
</head>
<body>

<h2>頁面已載入</h2>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
alert("JS 有跑到這裡");

liff.init({ liffId: "2009628398-05DKrr3H" })
.then(() => {

  alert("LIFF init 成功");

  if (!liff.isLoggedIn()) {
    alert("未登入，準備 login");
    liff.login();
  } else {

    alert("已登入");

    liff.getProfile().then(p => {
      alert("UID：" + p.userId);
    });

  }

})
.catch(err => {
  alert("LIFF 錯誤：" + JSON.stringify(err));
});
</script>

</body>
</html>
